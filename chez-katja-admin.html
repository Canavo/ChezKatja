<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez Katja – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf6ef;--warm:#f2e8d9;--brown:#5c3d2e;--brown-light:#8b6354;
    --accent:#c0392b;--accent-soft:#e8c4be;--green:#2d6a4f;--green-soft:#b7dac9;
    --gold:#c9a84c;--text:#2c1810;--text-muted:#8b7355;--border:#d4c4a8;
    --shadow:rgba(92,61,46,0.12);--admin:#1a3a5c;--admin-light:#e8f0f8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

  /* LOGIN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--brown);}
  .login-card{background:white;border-radius:24px;padding:40px 30px;max-width:340px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.25);text-align:center;}
  .login-logo{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--brown);margin-bottom:4px;}
  .login-logo span{color:var(--gold);}
  .login-sub{font-size:.76rem;color:var(--text-muted);margin-bottom:26px;letter-spacing:.05em;text-transform:uppercase;}
  .login-label{font-size:.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;text-align:left;display:block;margin-bottom:5px;}
  .login-input{width:100%;padding:12px 14px;border-radius:11px;border:2px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);background:var(--cream);margin-bottom:14px;-webkit-appearance:none;}
  .login-input:focus{outline:none;border-color:var(--brown);}
  .login-btn{width:100%;padding:13px;border-radius:11px;border:none;background:var(--brown);color:white;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .login-btn:hover{background:var(--accent);}
  .login-error{color:var(--accent);font-size:.8rem;margin-top:9px;display:none;}

  /* APP */
  .app{display:none;}
  .header{background:var(--admin);color:white;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
  .back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;width:34px;height:34px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;}
  .back-btn:hover{background:rgba(255,255,255,.22);}
  .header-center{flex:1;}
  .header-logo{font-family:'Playfair Display',serif;font-size:1.35rem;letter-spacing:.04em;}
  .header-logo span{color:var(--gold);}
  .header-badge{background:rgba(255,255,255,.15);font-size:.62rem;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;display:inline-block;}
  .logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .logout-btn:hover{background:rgba(255,255,255,.2);}
  .container{max-width:960px;margin:0 auto;padding:22px 16px 60px;}

  .admin-tabs{display:flex;gap:4px;background:white;border-radius:13px;padding:5px;border:1px solid var(--border);margin-bottom:22px;box-shadow:0 2px 8px var(--shadow);}
  .admin-tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all .2s;text-align:center;}
  .admin-tab.active{background:var(--admin);color:white;font-weight:600;}

  .week-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .week-tab{padding:7px 16px;border-radius:30px;border:2px solid var(--border);background:white;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;}
  .week-tab.active{background:var(--admin);border-color:var(--admin);color:white;}

  .day-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:9px 13px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:center;transition:all .2s;min-width:70px;}
  .day-tab.active{background:var(--admin);border-color:var(--admin);color:white;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-tab.today:not(.active){border-color:var(--gold);}
  .day-tab.today:not(.active) .day-name{color:var(--gold);}
  .day-name{font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:2px;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-date{font-size:.8rem;font-weight:500;}
  .today-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin-left:3px;vertical-align:middle;}

  .card{background:white;border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:14px;box-shadow:0 2px 8px var(--shadow);}
  .card-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--brown);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .kw-badge{font-size:.66rem;font-weight:600;background:var(--warm);color:var(--brown-light);padding:3px 9px;border-radius:20px;}

  /* MENU EDITOR */
  .menu-entry{background:var(--cream);border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);position:relative;}
  .menu-entry-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .type-select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;background:white;color:var(--text);cursor:pointer;}
  .field-label{font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block;}
  .label-input,.main-input,.sides-input{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);background:white;margin-bottom:7px;}
  .label-input:focus,.main-input:focus,.sides-input:focus{outline:none;border-color:var(--admin);}
  .sides-input{resize:vertical;min-height:52px;font-size:.82rem;}
  .remove-entry-btn{position:absolute;top:9px;right:9px;background:var(--accent-soft);border:none;color:var(--accent);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;}

  /* TOGGLES for pork/dessert */
  .toggle-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
  .toggle-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--text-muted);transition:all .2s;user-select:none;}
  .toggle-chip.on-pork{background:#ffe4d6;border-color:#f5a090;color:#c0392b;}
  .toggle-chip.on-dessert{background:#f3e6ff;border-color:#c9a0e0;color:#7b2d8b;}

  .add-menu-btn{width:100%;padding:10px;border-radius:10px;border:2px dashed var(--border);background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;margin-bottom:10px;}
  .add-menu-btn:hover{border-color:var(--admin);color:var(--admin);}
  .save-menu-btn{width:100%;padding:13px;border-radius:11px;border:none;background:var(--admin);color:white;font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .save-menu-btn:hover{background:var(--brown);}
  .type-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dot-fleisch{background:var(--accent);}
  .dot-vegi{background:var(--green);}
  .dot-schnaeppchen{background:var(--gold);}

  /* REGS */
  .reg-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-bottom:14px;}
  .reg-stat{background:var(--admin-light);border-radius:11px;padding:12px;text-align:center;}
  .reg-stat-num{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--admin);font-weight:900;}
  .reg-stat-label{font-size:.68rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .reg-item{display:flex;align-items:center;padding:10px 13px;border-radius:10px;background:var(--cream);margin-bottom:7px;border:1.5px solid transparent;}
  .reg-avatar{width:33px;height:33px;border-radius:50%;background:var(--admin);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;margin-right:10px;}
  .reg-info{flex:1;}
  .reg-name{font-weight:600;font-size:.88rem;}
  .reg-menu{font-size:.73rem;color:var(--text-muted);margin-top:1px;}
  .reg-pay{font-size:.71rem;font-weight:600;padding:3px 9px;border-radius:12px;flex-shrink:0;}
  .reg-pay.twint{background:#e8f4fd;color:#1a73c9;}
  .reg-pay.bar{background:#e8f5e9;color:#2e7d32;}
  .delete-reg-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:4px 6px;border-radius:6px;transition:all .2s;flex-shrink:0;}
  .delete-reg-btn:hover{color:var(--accent);background:var(--accent-soft);}
  .reg-empty{text-align:center;padding:26px;color:var(--text-muted);font-size:.88rem;}
  .action-btn{padding:8px 16px;border-radius:9px;border:2px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text-muted);}
  .action-btn:hover{border-color:var(--admin);color:var(--admin);}
  .action-btn.danger{border-color:var(--accent-soft);color:var(--accent);}
  .action-btn.danger:hover{border-color:var(--accent);background:var(--accent-soft);}
  .menu-summary-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--cream);border-radius:8px;margin-bottom:5px;font-size:.83rem;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--admin);color:white;padding:12px 22px;border-radius:30px;font-size:.86rem;font-weight:500;z-index:300;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:20px;padding:26px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown);margin-bottom:8px;}
  .modal p{font-size:.84rem;color:var(--text-muted);margin-bottom:18px;line-height:1.5;}
  .modal-actions{display:flex;gap:10px;}
  .modal-cancel{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.86rem;cursor:pointer;color:var(--text-muted);}
  .modal-confirm{flex:1;padding:10px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;}

  @media print{.header,.admin-tabs,.week-tabs,.day-tabs,.no-print{display:none!important;}.card{box-shadow:none;border:1px solid #ccc;}body{background:white;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">CHEZ <span>KATJA</span></div>
    <div class="login-sub">Admin – Personal</div>
    <label class="login-label">Passwort</label>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••••">
    <button class="login-btn" onclick="doLogin()">Anmelden</button>
    <div class="login-error" id="loginError">❌ Falsches Passwort</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="header">
    <a class="back-btn" href="index.html" title="Zurück">←</a>
    <div class="header-center">
      <div class="header-logo">CHEZ <span>KATJA</span></div>
      <div class="header-badge">⚙️ Admin</div>
    </div>
    <button class="logout-btn" onclick="logout()">Abmelden</button>
  </div>
  <div class="container">
    <div class="admin-tabs">
      <button class="admin-tab active" id="tabMenus" onclick="switchTab('menus')">🍽️ Menüplan</button>
      <button class="admin-tab" id="tabRegs" onclick="switchTab('regs')">📋 Anmeldungen</button>
    </div>

    <!-- MENUS PANEL -->
    <div id="panelMenus">
      <div class="week-tabs">
        <button class="week-tab active" id="mtab-current" onclick="switchMWeek('current')">Diese Woche</button>
        <button class="week-tab" id="mtab-next" onclick="switchMWeek('next')">Nächste Woche</button>
      </div>
      <div class="day-tabs" id="mDayTabs"></div>
      <div id="menuEditorArea"></div>
    </div>

    <!-- REGS PANEL -->
    <div id="panelRegs" style="display:none;">
      <div class="week-tabs">
        <button class="week-tab active" id="rtab-current" onclick="switchRWeek('current')">Diese Woche</button>
        <button class="week-tab" id="rtab-next" onclick="switchRWeek('next')">Nächste Woche</button>
      </div>
      <div class="day-tabs" id="rDayTabs"></div>
      <div id="regsArea"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Bestätigen</h3>
    <p id="modalText"></p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-confirm" id="modalConfirmBtn">Löschen</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ADMIN_PW='ChezKatja2026';
const SK={regs:'chezkatja_regs',menus:'chezkatja_menus'};
const DAY_NAMES=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
const DAY_SHORT=['Mo','Di','Mi','Do','Fr'];

function todayStr(){return new Date().toISOString().slice(0,10);}
function getMonday(offset=0){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);return d.toISOString().slice(0,10);}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtShort(s){const[,m,d]=s.split('-');return`${d}.${m}.`;}
function fmtFull(s){const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function weekDates(offset){const mon=getMonday(offset);return Array.from({length:5},(_,i)=>addDays(mon,i));}
function getISOWeek(d){const dt=new Date(d.getTime());dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt.getTime()-w1.getTime())/86400000-3+(w1.getDay()+6)%7)/7);}
function uid(){return Math.random().toString(36).slice(2,8);}
function loadRegs(){try{return JSON.parse(localStorage.getItem(SK.regs)||'{}');}catch{return{};}}
function saveRegs(r){localStorage.setItem(SK.regs,JSON.stringify(r));}
function loadMenus(){try{return JSON.parse(localStorage.getItem(SK.menus)||'{}');}catch{return{};}}
function saveMenus(m){localStorage.setItem(SK.menus,JSON.stringify(m));}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escT(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

// ── AUTH ──
function doLogin(){
  if(document.getElementById('pwInput').value===ADMIN_PW){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    document.getElementById('loginError').style.display='none';
    init();
  } else {
    document.getElementById('loginError').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function logout(){document.getElementById('loginScreen').style.display='flex';document.getElementById('appScreen').style.display='none';document.getElementById('pwInput').value='';}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── STATE ──
let activeTab='menus';
let mWeek='current',mDayIdx=0;
let rWeek='current',rDayIdx=0;
let draftMenus={};
let toastTimer=null;

function init(){
  const saved=loadMenus();
  draftMenus=JSON.parse(JSON.stringify(saved));
  const today=todayStr();
  const ti=weekDates(0).indexOf(today);
  mDayIdx=ti>=0?ti:0;
  rDayIdx=ti>=0?ti:0;
  renderMenuTab();renderRegsTab();
}

// ── TABS ──
function switchTab(t){
  activeTab=t;
  document.getElementById('tabMenus').classList.toggle('active',t==='menus');
  document.getElementById('tabRegs').classList.toggle('active',t==='regs');
  document.getElementById('panelMenus').style.display=t==='menus'?'block':'none';
  document.getElementById('panelRegs').style.display=t==='regs'?'block':'none';
}

// ── MENU TAB ──
function switchMWeek(w){mWeek=w;mDayIdx=0;document.getElementById('mtab-current').classList.toggle('active',w==='current');document.getElementById('mtab-next').classList.toggle('active',w==='next');renderMenuTab();}
function renderMenuTab(){renderMDayTabs();renderMenuEditor();}

function renderMDayTabs(){
  const offset=mWeek==='next'?1:0;
  const dates=weekDates(offset);
  const today=todayStr();
  const ct=document.getElementById('mDayTabs');
  ct.innerHTML='';
  dates.forEach((date,idx)=>{
    const btn=document.createElement('div');
    btn.className='day-tab'+(idx===mDayIdx?' active':'')+(date===today?' today':'');
    btn.innerHTML=`<div class="day-name">${DAY_SHORT[idx]}${date===today?'<span class="today-dot"></span>':''}</div><div class="day-date">${fmtShort(date)}</div>`;
    btn.onclick=()=>{mDayIdx=idx;renderMenuTab();};
    ct.appendChild(btn);
  });
}

function renderMenuEditor(){
  const offset=mWeek==='next'?1:0;
  const dates=weekDates(offset);
  const date=dates[mDayIdx];
  const kw=getISOWeek(new Date(date));
  const entries=draftMenus[date]||[];
  let html='';
  entries.forEach((m,i)=>{
    const typeOpts=['fleisch','vegi','schnaeppchen'].map(t=>
      `<option value="${t}"${m.type===t?' selected':''}>${t==='fleisch'?'🥩 Mittagsmenü':t==='vegi'?'🥦 Vegi-Menü':'⭐ Schnäppchen'}</option>`
    ).join('');
    html+=`<div class="menu-entry">
      <button class="remove-entry-btn" onclick="removeEntry(${i})">×</button>
      <div class="menu-entry-header">
        <div class="type-dot dot-${m.type}"></div>
        <select class="type-select" onchange="updateEntry(${i},'type',this.value)">${typeOpts}</select>
      </div>
      <label class="field-label">Bezeichnung</label>
      <input class="label-input" placeholder="z.B. Mittagsmenü / Schnäppchen Fr. 8.–" value="${esc(m.label)}" oninput="updateEntry(${i},'label',this.value)">
      <label class="field-label">Hauptgericht *</label>
      <input class="main-input" placeholder="Gericht" value="${esc(m.main)}" oninput="updateEntry(${i},'main',this.value)">
      <label class="field-label">Beilagen</label>
      <textarea class="sides-input" placeholder="Eine pro Zeile" oninput="updateEntry(${i},'sides',this.value)">${escT(m.sides||'')}</textarea>
      <label class="field-label">Kennzeichnungen</label>
      <div class="toggle-row">
        <div class="toggle-chip${m.pork?' on-pork':''}" onclick="toggleFlag(${i},'pork')">🐷 Schweinefleisch${m.pork?' ✓':''}</div>
        <div class="toggle-chip${m.dessert?' on-dessert':''}" onclick="toggleFlag(${i},'dessert')">🍮 Dessert${m.dessert?' ✓':''}</div>
      </div>
    </div>`;
  });
  document.getElementById('menuEditorArea').innerHTML=`<div class="card">
    <div class="card-title"><span>${DAY_NAMES[mDayIdx]}, ${fmtFull(date)}</span><span class="kw-badge">KW ${kw}</span></div>
    ${html}
    <button class="add-menu-btn" onclick="addEntry()">+ Menüoption hinzufügen</button>
    <button class="save-menu-btn" onclick="saveMenuDay()">💾 Menü speichern</button>
  </div>`;
}

function addEntry(){
  const offset=mWeek==='next'?1:0;
  const date=weekDates(offset)[mDayIdx];
  if(!draftMenus[date])draftMenus[date]=[];
  const n=draftMenus[date].length;
  const defs=[{type:'fleisch',label:'Mittagsmenü'},{type:'vegi',label:'Vegi-Menü'},{type:'schnaeppchen',label:'Schnäppchen Fr. 8.–'}];
  const def=defs[n%3];
  draftMenus[date].push({id:uid(),type:def.type,label:def.label,main:'',sides:'',pork:false,dessert:false});
  renderMenuEditor();
}
function removeEntry(i){
  const offset=mWeek==='next'?1:0;
  const date=weekDates(offset)[mDayIdx];
  draftMenus[date].splice(i,1);
  renderMenuEditor();
}
function updateEntry(i,field,val){
  const offset=mWeek==='next'?1:0;
  const date=weekDates(offset)[mDayIdx];
  if(draftMenus[date]&&draftMenus[date][i]){
    draftMenus[date][i][field]=val;
    if(field==='type')renderMenuEditor();
  }
}
function toggleFlag(i,flag){
  const offset=mWeek==='next'?1:0;
  const date=weekDates(offset)[mDayIdx];
  if(draftMenus[date]&&draftMenus[date][i]){
    draftMenus[date][i][flag]=!draftMenus[date][i][flag];
    renderMenuEditor();
  }
}
function saveMenuDay(){
  const offset=mWeek==='next'?1:0;
  const date=weekDates(offset)[mDayIdx];
  const entries=draftMenus[date]||[];
  for(const e of entries){if(!e.main.trim()){showToast('❌ Bitte alle Hauptgerichte ausfüllen');return;}}
  const all=loadMenus();
  all[date]=entries.map(e=>({...e,id:e.id||uid()}));
  saveMenus(all);
  draftMenus[date]=JSON.parse(JSON.stringify(all[date]));
  showToast('✅ Menü für '+DAY_NAMES[mDayIdx]+' gespeichert!');
}

// ── REGS TAB ──
function switchRWeek(w){rWeek=w;rDayIdx=0;document.getElementById('rtab-current').classList.toggle('active',w==='current');document.getElementById('rtab-next').classList.toggle('active',w==='next');renderRegsTab();}
function renderRegsTab(){renderRDayTabs();renderRegsArea();}

function renderRDayTabs(){
  const offset=rWeek==='next'?1:0;
  const dates=weekDates(offset);
  const today=todayStr();
  const ct=document.getElementById('rDayTabs');
  ct.innerHTML='';
  dates.forEach((date,idx)=>{
    const regs=loadRegs();
    const count=(regs[date]||[]).length;
    const btn=document.createElement('div');
    btn.className='day-tab'+(idx===rDayIdx?' active':'')+(date===today?' today':'');
    btn.innerHTML=`<div class="day-name">${DAY_SHORT[idx]}${date===today?'<span class="today-dot"></span>':''}</div><div class="day-date">${fmtShort(date)}</div>${count>0?`<div style="font-size:.62rem;margin-top:2px;font-weight:700;color:${idx===rDayIdx?'var(--gold)':'var(--admin)'};">${count} 👤</div>`:''}`;
    btn.onclick=()=>{rDayIdx=idx;renderRegsTab();};
    ct.appendChild(btn);
  });
}

function renderRegsArea(){
  const offset=rWeek==='next'?1:0;
  const dates=weekDates(offset);
  const date=dates[rDayIdx];
  const kw=getISOWeek(new Date(date));
  const regs=loadRegs();
  const dr=(regs[date]||[]).slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
  const total=dr.length;
  const twint=dr.filter(r=>r.pay==='twint').length;
  const bar=dr.filter(r=>r.pay==='bar').length;
  const menuCount={};
  dr.forEach(r=>{menuCount[r.menuLabel]=(menuCount[r.menuLabel]||0)+1;});

  const menuSummary=Object.entries(menuCount).map(([k,v])=>
    `<div class="menu-summary-row"><span>${k}</span><strong>${v}×</strong></div>`).join('');

  const listHTML=!dr.length?'<div class="reg-empty">📋 Keine Anmeldungen</div>':
    dr.map(r=>{
      const ini=r.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      return `<div class="reg-item">
        <div class="reg-avatar">${ini}</div>
        <div class="reg-info"><div class="reg-name">${r.name}</div><div class="reg-menu">${r.menuLabel}</div></div>
        <span class="reg-pay ${r.pay}">${r.pay==='twint'?'📱 Twint':'💵 Bar'}</span>
        <button class="delete-reg-btn no-print" onclick="deleteReg('${r.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${date}')">🗑️</button>
      </div>`;
    }).join('');

  document.getElementById('regsArea').innerHTML=`<div class="card">
    <div class="card-title">
      <span>${DAY_NAMES[rDayIdx]}, ${fmtFull(date)}</span>
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;">
        <span class="kw-badge">KW ${kw}</span>
        <button class="action-btn no-print" onclick="window.print()">🖨️ Drucken</button>
        ${total?`<button class="action-btn danger no-print" onclick="clearAllRegs('${date}')">🗑️ Alle löschen</button>`:''}
      </div>
    </div>
    <div class="reg-overview">
      <div class="reg-stat"><div class="reg-stat-num">${total}</div><div class="reg-stat-label">Total</div></div>
      <div class="reg-stat"><div class="reg-stat-num">${twint}</div><div class="reg-stat-label">📱 Twint</div></div>
      <div class="reg-stat"><div class="reg-stat-num">${bar}</div><div class="reg-stat-label">💵 Bar</div></div>
    </div>
    ${menuSummary?`<div style="margin-bottom:12px;">${menuSummary}</div>`:''}
    ${listHTML}
  </div>`;
}

function deleteReg(name,date){
  showConfirm('Abmelden?',`Anmeldung von <strong>${name}</strong> löschen?`,()=>{
    const regs=loadRegs();
    if(regs[date]){regs[date]=regs[date].filter(r=>r.name.toLowerCase()!==name.toLowerCase());if(!regs[date].length)delete regs[date];}
    saveRegs(regs);renderRegsTab();showToast('🗑️ Anmeldung gelöscht');
  });
}
function clearAllRegs(date){
  showConfirm('Alle löschen?','Wirklich alle Anmeldungen für diesen Tag löschen?',()=>{
    const regs=loadRegs();delete regs[date];saveRegs(regs);renderRegsTab();showToast('🗑️ Alle Anmeldungen gelöscht');
  });
}

// ── MODAL ──
function showConfirm(title,text,cb){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalText').innerHTML=text;
  document.getElementById('modalConfirmBtn').onclick=()=>{closeModal();cb();};
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});

// ── TOAST ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}
</script>
</body>
