<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez Katja – Menüanmeldung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#faf6ef;--warm:#f2e8d9;--brown:#5c3d2e;--brown-light:#8b6354;
    --accent:#c0392b;--accent-soft:#e8c4be;--green:#2d6a4f;--green-soft:#b7dac9;
    --gold:#c9a84c;--text:#2c1810;--text-muted:#8b7355;--border:#d4c4a8;
    --shadow:rgba(92,61,46,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
  .header{background:var(--brown);color:var(--cream);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
  .header-logo{font-family:'Playfair Display',serif;font-size:1.5rem;letter-spacing:.04em;}
  .header-logo span{color:var(--gold);}
  .header-sub{font-size:.75rem;opacity:.7;margin-top:2px;}
  .header-info{text-align:right;font-size:.78rem;opacity:.8;line-height:1.5;}
  .container{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
  .week-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .week-tab{padding:8px 20px;border-radius:30px;border:2px solid var(--border);background:white;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;}
  .week-tab.active{background:var(--brown);border-color:var(--brown);color:white;}
  .week-tab:disabled{opacity:.35;cursor:default;}
  .day-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:10px 16px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:center;transition:all .2s;min-width:80px;}
  .day-tab.active{background:var(--brown);border-color:var(--brown);color:white;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-tab.today{border-color:var(--gold);}
  .day-tab.today:not(.active) .day-name{color:var(--gold);}
  .day-name{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:2px;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-date{font-size:.85rem;font-weight:500;}
  .today-dot{display:inline-block;width:7px;height:7px;background:var(--gold);border-radius:50%;margin-left:4px;vertical-align:middle;}
  .menu-card{background:white;border-radius:16px;border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:0 2px 8px var(--shadow);}
  .menu-card-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .kw-badge{font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;background:var(--warm);color:var(--brown-light);padding:3px 10px;border-radius:20px;}
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:500px){.menu-grid{grid-template-columns:1fr;}}
  .menu-option{border-radius:12px;padding:14px;border:1.5px solid transparent;cursor:pointer;transition:all .2s;position:relative;}
  .menu-option.fleisch{background:#fdf3f2;border-color:var(--accent-soft);}
  .menu-option.vegi{background:#f0f7f4;border-color:var(--green-soft);}
  .menu-option.schnaeppchen{background:#fdf8ee;border-color:#e8d9a0;}
  .menu-option.selected{border-width:2.5px;box-shadow:0 0 0 3px rgba(92,61,46,.08);}
  .menu-option.fleisch.selected{border-color:var(--accent);}
  .menu-option.vegi.selected{border-color:var(--green);}
  .menu-option.schnaeppchen.selected{border-color:var(--gold);}
  .menu-type-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .menu-option.fleisch .menu-type-label{color:var(--accent);}
  .menu-option.vegi .menu-type-label{color:var(--green);}
  .menu-option.schnaeppchen .menu-type-label{color:var(--gold);}
  .menu-main{font-size:.92rem;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;}
  .menu-sides{font-size:.78rem;color:var(--text-muted);line-height:1.4;}
  .menu-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;}
  .menu-option.fleisch.selected .menu-check{background:var(--accent);color:white;}
  .menu-option.vegi.selected .menu-check{background:var(--green);color:white;}
  .menu-option.schnaeppchen.selected .menu-check{background:var(--gold);color:white;}
  .schnaeppchen-price{display:inline-block;background:var(--gold);color:white;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:6px;}
  .menu-none{grid-column:1/-1;text-align:center;padding:24px;color:var(--text-muted);font-size:.9rem;background:var(--warm);border-radius:12px;}
  .form-card{background:white;border-radius:16px;border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:0 2px 8px var(--shadow);}
  .form-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--brown);margin-bottom:16px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:500px){.form-row{grid-template-columns:1fr;}}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-label{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
  .form-input{padding:11px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);background:var(--cream);transition:border-color .2s;-webkit-appearance:none;}
  .form-input:focus{outline:none;border-color:var(--brown);}
  .payment-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .pay-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:white;cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;color:var(--text-muted);}
  .pay-btn.selected{border-color:var(--brown);background:var(--warm);color:var(--brown);font-weight:600;}
  .pay-icon{font-size:1.2rem;margin-bottom:2px;}
  .submit-btn{width:100%;padding:15px;border-radius:12px;border:none;background:var(--brown);color:white;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;}
  .submit-btn:hover{background:var(--accent);transform:translateY(-1px);}
  .list-card{background:white;border-radius:16px;border:1px solid var(--border);padding:20px;box-shadow:0 2px 8px var(--shadow);}
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .list-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--brown);}
  .list-count{background:var(--brown);color:white;font-size:.78rem;font-weight:700;padding:4px 12px;border-radius:20px;}
  .list-empty{text-align:center;padding:32px;color:var(--text-muted);font-size:.9rem;}
  .list-empty-icon{font-size:2rem;margin-bottom:8px;}
  .registration-item{display:flex;align-items:center;padding:12px 14px;border-radius:10px;background:var(--cream);margin-bottom:8px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
  .registration-item:hover{border-color:var(--accent);background:#fdf3f2;}
  .reg-avatar{width:36px;height:36px;border-radius:50%;background:var(--brown);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;margin-right:12px;}
  .reg-info{flex:1;}
  .reg-name{font-weight:600;font-size:.92rem;color:var(--text);}
  .reg-details{font-size:.77rem;color:var(--text-muted);margin-top:2px;}
  .reg-pay{font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;}
  .reg-pay.twint{background:#e8f4fd;color:#1a73c9;}
  .reg-pay.bar{background:#e8f5e9;color:#2e7d32;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:20px;padding:28px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--brown);margin-bottom:8px;}
  .modal p{font-size:.88rem;color:var(--text-muted);margin-bottom:20px;line-height:1.5;}
  .modal-name{font-weight:700;color:var(--text);}
  .modal-actions{display:flex;gap:10px;}
  .modal-cancel{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;color:var(--text-muted);}
  .modal-confirm{flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:white;padding:13px 24px;border-radius:30px;font-size:.88rem;font-weight:500;z-index:300;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .deadline-notice{background:#fff8e6;border:1px solid #f0d080;border-radius:10px;padding:10px 14px;font-size:.8rem;color:#8b6000;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .section-divider{text-align:center;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--border);margin:20px 0 16px;position:relative;}
  .section-divider::before,.section-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border);}
  .section-divider::before{left:0;}.section-divider::after{right:0;}
  .no-days-card{background:white;border-radius:16px;border:1px solid var(--border);padding:40px 20px;text-align:center;color:var(--text-muted);margin-bottom:20px;}
  .no-days-card .icon{font-size:2.5rem;margin-bottom:12px;}
  .no-days-card h3{font-family:'Playfair Display',serif;color:var(--brown);margin-bottom:6px;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-logo">CHEZ <span>KATJA</span></div>
    <div class="header-sub">Digitale Menüanmeldung</div>
  </div>
  <div class="header-info">🕐 07:00–18:00 Uhr<br>🍽️ Ausgabe 11:45–13:00 Uhr</div>
</div>
<div class="container">
  <div class="week-tabs">
    <button class="week-tab active" id="tab-current" onclick="switchWeek('current')">Diese Woche</button>
    <button class="week-tab" id="tab-next" onclick="switchWeek('next')">Nächste Woche</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div id="menuArea"></div>
  <div id="formArea"></div>
  <div class="list-card">
    <div class="list-header">
      <div class="list-title" id="listTitle">Anmeldungen</div>
      <div class="list-count" id="listCount">0</div>
    </div>
    <div id="registrationList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Abmelden?</h3>
    <p>Möchten Sie <span class="modal-name" id="modalName">–</span> vom Mittagessen am <span id="modalDay">–</span> abmelden?</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-confirm" onclick="confirmUnregister()">Ja, abmelden</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SK={regs:'chezkatja_regs',menus:'chezkatja_menus'};
const DAY_NAMES=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
const DAY_SHORT=['Mo','Di','Mi','Do','Fr'];

function todayStr(){return new Date().toISOString().slice(0,10);}
function getMonday(offset=0){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);return d.toISOString().slice(0,10);}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtShort(s){const[,m,d]=s.split('-');return`${d}.${m}.`;}
function fmtFull(s){const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function getISOWeek(d){const dt=new Date(d.getTime());dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt.getTime()-w1.getTime())/86400000-3+(w1.getDay()+6)%7)/7);}
function weekDates(offset){const mon=getMonday(offset);return Array.from({length:5},(_,i)=>addDays(mon,i));}
function loadRegs(){try{return JSON.parse(localStorage.getItem(SK.regs)||'{}');}catch{return{};}}
function saveRegs(r){localStorage.setItem(SK.regs,JSON.stringify(r));}
function loadMenus(){try{return JSON.parse(localStorage.getItem(SK.menus)||'{}');}catch{return{};}}

let viewWeek='current';
let currentDayIdx=0;
let selectedMenuId=null;
let selectedPay=null;
let unregisterTarget=null;
let toastTimer=null;

function visibleDays(){
  const today=todayStr();
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  return viewWeek==='current'?all.filter(d=>d>=today):all;
}

function init(){
  const dow=new Date().getDay();
  if(dow===0||dow===6){
    viewWeek='next';
    document.getElementById('tab-current').disabled=true;
    document.getElementById('tab-current').classList.remove('active');
    document.getElementById('tab-next').classList.add('active');
  }
  const vd=visibleDays();
  const todayIdx=vd.indexOf(todayStr());
  currentDayIdx=todayIdx>=0?todayIdx:0;
  render();
}

function switchWeek(w){
  viewWeek=w;currentDayIdx=0;selectedMenuId=null;selectedPay=null;
  document.getElementById('tab-current').classList.toggle('active',w==='current');
  document.getElementById('tab-next').classList.toggle('active',w==='next');
  render();
}

function render(){renderDayTabs();renderMenuArea();renderFormArea();renderList();}

function renderDayTabs(){
  const vd=visibleDays();
  const today=todayStr();
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const ct=document.getElementById('dayTabs');
  ct.innerHTML='';
  vd.forEach((date,idx)=>{
    const dow=all.indexOf(date);
    const btn=document.createElement('div');
    btn.className='day-tab'+(idx===currentDayIdx?' active':'')+(date===today?' today':'');
    btn.innerHTML=`<div class="day-name">${DAY_SHORT[dow]}${date===today?'<span class="today-dot"></span>':''}</div><div class="day-date">${fmtShort(date)}</div>`;
    btn.onclick=()=>{currentDayIdx=idx;selectedMenuId=null;render();};
    ct.appendChild(btn);
  });
}

function renderMenuArea(){
  const area=document.getElementById('menuArea');
  const vd=visibleDays();
  if(!vd.length){
    area.innerHTML=`<div class="no-days-card"><div class="icon">🌅</div><h3>Keine Tage verfügbar</h3><p>Diese Woche hat keine offenen Tage mehr.</p></div>`;
    return;
  }
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const menus=loadMenus();
  const dm=menus[date]||[];
  const kw=getISOWeek(new Date(date));
  let grid='';
  if(!dm.length){
    grid=`<div class="menu-none">📋 Noch kein Menü erfasst – das Chez Katja Team trägt es ein.</div>`;
  } else {
    dm.forEach(m=>{
      const sel=selectedMenuId===m.id;
      grid+=`<div class="menu-option ${m.type}${sel?' selected':''}" onclick="selMenu('${m.id}')">
        ${m.type==='schnaeppchen'?'<span class="schnaeppchen-price">Fr. 8.–</span>':''}
        <div class="menu-type-label">${m.label}</div>
        <div class="menu-main">${m.main}</div>
        <div class="menu-sides">${(m.sides||'').replace(/\n/g,'<br>')}</div>
        ${sel?'<div class="menu-check">✓</div>':''}
      </div>`;
    });
  }
  area.innerHTML=`<div class="menu-card">
    <div class="menu-card-title"><span>${DAY_NAMES[dow]}, ${fmtFull(date)}</span><span class="kw-badge">KW ${kw}</span></div>
    <div class="menu-grid">${grid}</div>
  </div>`;
}

function selMenu(id){selectedMenuId=id;renderMenuArea();updateSel();}
function updateSel(){const s=document.getElementById('menuSelect');if(s&&selectedMenuId)s.value=selectedMenuId;}

function renderFormArea(){
  const vd=visibleDays();
  if(!vd.length){document.getElementById('formArea').innerHTML='';return;}
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const menus=loadMenus();
  const dm=menus[date]||[];
  let opts='<option value="">– Menü wählen –</option>';
  dm.forEach(m=>{opts+=`<option value="${m.id}"${selectedMenuId===m.id?' selected':''}>${m.main}</option>`;});
  const pt=selectedPay==='twint'?' selected':'';
  const pb=selectedPay==='bar'?' selected':'';
  document.getElementById('formArea').innerHTML=`
    <div class="section-divider">Anmeldung</div>
    <div class="form-card">
      <div class="form-title">Für ${DAY_NAMES[dow]}, ${fmtShort(date)} anmelden</div>
      <div class="deadline-notice">⚠️ Anmeldung bis spätestens <strong>10:00 Uhr</strong></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ihr Name</label>
          <input class="form-input" type="text" id="nameInput" placeholder="Vor- und Nachname" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Menüwahl</label>
          <select class="form-input" id="menuSelect" onchange="onSelChange()">${opts}</select>
        </div>
      </div>
      <label class="form-label" style="margin-bottom:8px;display:block;">Bezahlart</label>
      <div class="payment-toggle">
        <button class="pay-btn${pt}" onclick="selPay('twint')"><div class="pay-icon">📱</div>Twint</button>
        <button class="pay-btn${pb}" onclick="selPay('bar')"><div class="pay-icon">💵</div>Bar</button>
      </div>
      <button class="submit-btn" onclick="submit()">✓ Anmelden</button>
    </div>`;
}

function onSelChange(){const s=document.getElementById('menuSelect');selectedMenuId=s.value||null;renderMenuArea();}
function selPay(t){selectedPay=t;const n=document.getElementById('nameInput');const v=n?n.value:'';renderFormArea();const n2=document.getElementById('nameInput');if(n2)n2.value=v;}

function submit(){
  const nameEl=document.getElementById('nameInput');
  const name=nameEl?nameEl.value.trim():'';
  const ms=document.getElementById('menuSelect');
  if(ms&&ms.value)selectedMenuId=ms.value;
  if(!name){showToast('❌ Bitte Namen eingeben');return;}
  if(!selectedMenuId){showToast('❌ Bitte ein Menü auswählen');return;}
  if(!selectedPay){showToast('❌ Bitte Bezahlart wählen');return;}
  const vd=visibleDays();
  const date=vd[currentDayIdx];
  const menus=loadMenus();
  const dm=menus[date]||[];
  const menu=dm.find(m=>m.id===selectedMenuId);
  const menuLabel=menu?menu.main:selectedMenuId;
  const regs=loadRegs();
  if(!regs[date])regs[date]=[];
  const ei=regs[date].findIndex(r=>r.name.toLowerCase()===name.toLowerCase());
  if(ei>=0){regs[date][ei]={name,menuId:selectedMenuId,menuLabel,pay:selectedPay};showToast('✏️ Anmeldung aktualisiert');}
  else{regs[date].push({name,menuId:selectedMenuId,menuLabel,pay:selectedPay});showToast('✅ Erfolgreich angemeldet!');}
  saveRegs(regs);
  selectedMenuId=null;selectedPay=null;
  renderMenuArea();renderFormArea();renderList();
}

function renderList(){
  const vd=visibleDays();
  if(!vd.length){document.getElementById('registrationList').innerHTML='<div class="list-empty"><div class="list-empty-icon">📋</div>Keine Tage verfügbar</div>';document.getElementById('listCount').textContent='0';return;}
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const regs=loadRegs();
  const dr=(regs[date]||[]).slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
  document.getElementById('listTitle').textContent=`Anmeldungen ${DAY_NAMES[dow]}`;
  document.getElementById('listCount').textContent=dr.length;
  const list=document.getElementById('registrationList');
  if(!dr.length){list.innerHTML='<div class="list-empty"><div class="list-empty-icon">📋</div>Noch keine Anmeldungen</div>';return;}
  list.innerHTML=dr.map(r=>{
    const ini=r.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    return `<div class="registration-item" onclick="openModal('${r.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}','${date}')" title="Klicken zum Abmelden">
      <div class="reg-avatar">${ini}</div>
      <div class="reg-info"><div class="reg-name">${r.name}</div><div class="reg-details">${r.menuLabel}</div></div>
      <span class="reg-pay ${r.pay}">${r.pay==='twint'?'📱 Twint':'💵 Bar'}</span>
    </div>`;
  }).join('');
}

function openModal(name,date){
  unregisterTarget={name,date};
  document.getElementById('modalName').textContent=name;
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  document.getElementById('modalDay').textContent=`${DAY_NAMES[dow]}, ${fmtShort(date)}`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');unregisterTarget=null;}
function confirmUnregister(){
  if(!unregisterTarget)return;
  const{name,date}=unregisterTarget;
  const regs=loadRegs();
  if(regs[date]){regs[date]=regs[date].filter(r=>r.name.toLowerCase()!==name.toLowerCase());if(!regs[date].length)delete regs[date];}
  saveRegs(regs);closeModal();renderList();showToast('🗑️ Abmeldung erfolgreich');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
init();
</script>
</body>
</html>
