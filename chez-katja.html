<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez Katja – Menüanmeldung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf6ef;--warm:#f2e8d9;--brown:#5c3d2e;--brown-light:#8b6354;
    --accent:#c0392b;--accent-soft:#e8c4be;--green:#2d6a4f;--green-soft:#b7dac9;
    --gold:#c9a84c;--text:#2c1810;--text-muted:#8b7355;--border:#d4c4a8;
    --shadow:rgba(92,61,46,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

  .header{background:var(--brown);color:var(--cream);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
  .back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;width:34px;height:34px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;}
  .back-btn:hover{background:rgba(255,255,255,.22);}
  .header-center{flex:1;}
  .header-logo{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:.04em;}
  .header-logo span{color:var(--gold);}
  .header-sub{font-size:.72rem;opacity:.7;margin-top:1px;}
  .header-info{text-align:right;font-size:.72rem;opacity:.8;line-height:1.5;flex-shrink:0;}

  .container{max-width:900px;margin:0 auto;padding:20px 16px 60px;}

  .week-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .week-tab{padding:8px 18px;border-radius:30px;border:2px solid var(--border);background:white;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer;transition:all .2s;}
  .week-tab.active{background:var(--brown);border-color:var(--brown);color:white;}
  .week-tab:disabled{opacity:.35;cursor:default;}

  .day-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:9px 14px;border-radius:12px;border:1.5px solid var(--border);background:white;cursor:pointer;text-align:center;transition:all .2s;min-width:72px;}
  .day-tab.active{background:var(--brown);border-color:var(--brown);color:white;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-tab.today:not(.active){border-color:var(--gold);}
  .day-tab.today:not(.active) .day-name{color:var(--gold);}
  .day-name{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:2px;}
  .day-tab.active .day-name{color:var(--gold);}
  .day-date{font-size:.82rem;font-weight:500;}
  .today-dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin-left:3px;vertical-align:middle;}

  .menu-card{background:white;border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:18px;box-shadow:0 2px 8px var(--shadow);}
  .menu-card-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--brown);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .kw-badge{font-size:.68rem;font-weight:600;background:var(--warm);color:var(--brown-light);padding:3px 9px;border-radius:20px;}
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:480px){.menu-grid{grid-template-columns:1fr;}}

  .menu-option{border-radius:12px;padding:13px;border:1.5px solid transparent;cursor:pointer;transition:all .2s;position:relative;}
  .menu-option.fleisch{background:#fdf3f2;border-color:var(--accent-soft);}
  .menu-option.vegi{background:#f0f7f4;border-color:var(--green-soft);}
  .menu-option.schnaeppchen{background:#fdf8ee;border-color:#e8d9a0;}
  .menu-option.selected{border-width:2.5px;box-shadow:0 0 0 3px rgba(92,61,46,.08);}
  .menu-option.fleisch.selected{border-color:var(--accent);}
  .menu-option.vegi.selected{border-color:var(--green);}
  .menu-option.schnaeppchen.selected{border-color:var(--gold);}
  .menu-type-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
  .menu-option.fleisch .menu-type-label{color:var(--accent);}
  .menu-option.vegi .menu-type-label{color:var(--green);}
  .menu-option.schnaeppchen .menu-type-label{color:var(--gold);}
  .menu-main{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;}
  .menu-sides{font-size:.76rem;color:var(--text-muted);line-height:1.4;}
  .menu-check{position:absolute;top:9px;right:9px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
  .menu-option.fleisch.selected .menu-check{background:var(--accent);color:white;}
  .menu-option.vegi.selected .menu-check{background:var(--green);color:white;}
  .menu-option.schnaeppchen.selected .menu-check{background:var(--gold);color:white;}
  .schnaeppchen-price{display:inline-block;background:var(--gold);color:white;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:5px;}
  .menu-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .badge{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;}
  .badge-pork{background:#ffe4d6;color:#c0392b;}
  .badge-dessert{background:#f3e6ff;color:#7b2d8b;}
  .menu-none{grid-column:1/-1;text-align:center;padding:22px;color:var(--text-muted);font-size:.88rem;background:var(--warm);border-radius:12px;}

  .closed-notice{background:#fff0f0;border:1.5px solid #f5c0b8;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--accent);}
  .closed-notice strong{font-weight:700;}

  .form-card{background:white;border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:18px;box-shadow:0 2px 8px var(--shadow);}
  .form-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--brown);margin-bottom:14px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-label{font-size:.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
  .form-input{padding:10px 13px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--cream);transition:border-color .2s;-webkit-appearance:none;}
  .form-input:focus{outline:none;border-color:var(--brown);}
  .form-input:disabled{opacity:.45;cursor:not-allowed;}
  .payment-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .pay-btn{flex:1;padding:11px;border-radius:10px;border:2px solid var(--border);background:white;cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:500;color:var(--text-muted);}
  .pay-btn.selected{border-color:var(--brown);background:var(--warm);color:var(--brown);font-weight:600;}
  .pay-btn:disabled{opacity:.4;cursor:not-allowed;}
  .pay-icon{font-size:1.1rem;margin-bottom:2px;}
  .submit-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--brown);color:white;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;}
  .submit-btn:hover:not(:disabled){background:var(--accent);transform:translateY(-1px);}
  .submit-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;}

  .section-divider{text-align:center;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--border);margin:18px 0 14px;position:relative;}
  .section-divider::before,.section-divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--border);}
  .section-divider::before{left:0;}.section-divider::after{right:0;}
  .deadline-notice{background:#fff8e6;border:1px solid #f0d080;border-radius:10px;padding:9px 13px;font-size:.78rem;color:#8b6000;margin-bottom:12px;display:flex;align-items:center;gap:7px;}

  .list-card{background:white;border-radius:16px;border:1px solid var(--border);padding:18px;box-shadow:0 2px 8px var(--shadow);}
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .list-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--brown);}
  .list-count{background:var(--brown);color:white;font-size:.75rem;font-weight:700;padding:4px 11px;border-radius:20px;}
  .list-empty{text-align:center;padding:28px;color:var(--text-muted);font-size:.88rem;}
  .list-empty-icon{font-size:1.8rem;margin-bottom:8px;}

  .registration-item{display:flex;align-items:center;padding:11px 13px;border-radius:10px;background:var(--cream);margin-bottom:7px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
  .registration-item:hover{border-color:var(--accent);background:#fdf3f2;}
  .registration-item .hint{font-size:.68rem;color:var(--text-muted);margin-top:1px;}
  .reg-avatar{width:34px;height:34px;border-radius:50%;background:var(--brown);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;flex-shrink:0;margin-right:10px;}
  .reg-info{flex:1;}
  .reg-name{font-weight:600;font-size:.9rem;color:var(--text);}
  .reg-details{font-size:.75rem;color:var(--text-muted);margin-top:2px;}
  .reg-pay{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:12px;flex-shrink:0;}
  .reg-pay.twint{background:#e8f4fd;color:#1a73c9;}
  .reg-pay.bar{background:#e8f5e9;color:#2e7d32;}

  /* ABMELDE MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:20px;padding:26px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--brown);margin-bottom:8px;}
  .modal p{font-size:.85rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5;}
  .modal-input{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--cream);margin-bottom:12px;}
  .modal-input:focus{outline:none;border-color:var(--accent);}
  .modal-error{color:var(--accent);font-size:.78rem;margin-bottom:10px;display:none;}
  .modal-actions{display:flex;gap:10px;}
  .modal-cancel{flex:1;padding:11px;border-radius:10px;border:2px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;color:var(--text-muted);}
  .modal-confirm{flex:1;padding:11px;border-radius:10px;border:none;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:white;padding:12px 22px;border-radius:30px;font-size:.86rem;font-weight:500;z-index:300;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .no-days-card{background:white;border-radius:16px;border:1px solid var(--border);padding:36px 20px;text-align:center;color:var(--text-muted);margin-bottom:18px;}
  .no-days-card .icon{font-size:2.2rem;margin-bottom:10px;}
  .no-days-card h3{font-family:'Playfair Display',serif;color:var(--brown);margin-bottom:5px;}
</style>
</head>
<body>
<div class="header">
  <a class="back-btn" href="index.html" title="Zurück">←</a>
  <div class="header-center">
    <div class="header-logo">CHEZ <span>KATJA</span></div>
    <div class="header-sub">Digitale Menüanmeldung</div>
  </div>
  <div class="header-info">🕐 07:00–18:00<br>🍴 11:45–13:00</div>
</div>

<div class="container">
  <div class="week-tabs">
    <button class="week-tab active" id="tab-current" onclick="switchWeek('current')">Diese Woche</button>
    <button class="week-tab" id="tab-next" onclick="switchWeek('next')">Nächste Woche</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div id="menuArea"></div>
  <div id="closedBanner"></div>
  <div id="formArea"></div>
  <div class="list-card">
    <div class="list-header">
      <div class="list-title" id="listTitle">Anmeldungen</div>
      <div class="list-count" id="listCount">0</div>
    </div>
    <div id="registrationList"></div>
  </div>
</div>

<!-- ABMELDE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Abmelden</h3>
    <p>Geben Sie Ihren <strong>Namen</strong> ein, um sich abzumelden. Sie können nur Ihre eigene Anmeldung löschen.</p>
    <input class="modal-input" type="text" id="modalNameInput" placeholder="Ihr Name eingeben…" autocomplete="name">
    <div class="modal-error" id="modalError">❌ Name stimmt nicht überein.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-confirm" onclick="confirmUnregister()">Abmelden</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SK={regs:'chezkatja_regs',menus:'chezkatja_menus'};
const DAY_NAMES=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
const DAY_SHORT=['Mo','Di','Mi','Do','Fr'];
const DEADLINE_HOUR=10; // 10:00 Uhr

function todayStr(){return new Date().toISOString().slice(0,10);}
function nowHour(){return new Date().getHours();}
function getMonday(offset=0){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);return d.toISOString().slice(0,10);}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtShort(s){const[,m,d]=s.split('-');return`${d}.${m}.`;}
function fmtFull(s){const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function weekDates(offset){const mon=getMonday(offset);return Array.from({length:5},(_,i)=>addDays(mon,i));}
function getISOWeek(d){const dt=new Date(d.getTime());dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt.getTime()-w1.getTime())/86400000-3+(w1.getDay()+6)%7)/7);}
function loadRegs(){try{return JSON.parse(localStorage.getItem(SK.regs)||'{}');}catch{return{};}}
function saveRegs(r){localStorage.setItem(SK.regs,JSON.stringify(r));}
function loadMenus(){try{return JSON.parse(localStorage.getItem(SK.menus)||'{}');}catch{return{};}}

// Is registration closed for a given date?
function isClosed(date){
  const today=todayStr();
  if(date===today && nowHour()>=DEADLINE_HOUR) return true;
  return false;
}

let viewWeek='current',currentDayIdx=0,selectedMenuId=null,selectedPay=null;
let unregisterDate=null,toastTimer=null;

function visibleDays(){
  const today=todayStr();
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  return viewWeek==='current'?all.filter(d=>d>=today):all;
}

function init(){
  const dow=new Date().getDay();
  if(dow===0||dow===6){
    viewWeek='next';
    document.getElementById('tab-current').disabled=true;
    document.getElementById('tab-current').classList.remove('active');
    document.getElementById('tab-next').classList.add('active');
  }
  const vd=visibleDays();
  const ti=vd.indexOf(todayStr());
  currentDayIdx=ti>=0?ti:0;
  render();
}

function switchWeek(w){
  viewWeek=w;currentDayIdx=0;selectedMenuId=null;selectedPay=null;
  document.getElementById('tab-current').classList.toggle('active',w==='current');
  document.getElementById('tab-next').classList.toggle('active',w==='next');
  render();
}
function render(){renderDayTabs();renderMenuArea();renderClosedBanner();renderFormArea();renderList();}

function renderDayTabs(){
  const vd=visibleDays();
  const today=todayStr();
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const ct=document.getElementById('dayTabs');
  ct.innerHTML='';
  vd.forEach((date,idx)=>{
    const dow=all.indexOf(date);
    const btn=document.createElement('div');
    btn.className='day-tab'+(idx===currentDayIdx?' active':'')+(date===today?' today':'');
    btn.innerHTML=`<div class="day-name">${DAY_SHORT[dow]}${date===today?'<span class="today-dot"></span>':''}</div><div class="day-date">${fmtShort(date)}</div>`;
    btn.onclick=()=>{currentDayIdx=idx;selectedMenuId=null;render();};
    ct.appendChild(btn);
  });
}

function renderMenuArea(){
  const area=document.getElementById('menuArea');
  const vd=visibleDays();
  if(!vd.length){area.innerHTML=`<div class="no-days-card"><div class="icon">🌅</div><h3>Keine Tage verfügbar</h3><p>Diese Woche hat keine offenen Tage mehr.</p></div>`;return;}
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const menus=loadMenus();
  const dm=menus[date]||[];
  const kw=getISOWeek(new Date(date));
  let grid='';
  if(!dm.length){
    grid=`<div class="menu-none">📋 Noch kein Menü erfasst – das Chez Katja Team trägt es ein.</div>`;
  } else {
    dm.forEach(m=>{
      const sel=selectedMenuId===m.id;
      let badges='';
      if(m.pork) badges+=`<span class="badge badge-pork">🐷 Schweinefleisch</span>`;
      if(m.dessert) badges+=`<span class="badge badge-dessert">🍮 Dessert</span>`;
      grid+=`<div class="menu-option ${m.type}${sel?' selected':''}" onclick="selMenu('${m.id}')">
        ${m.type==='schnaeppchen'?'<span class="schnaeppchen-price">Fr. 8.–</span>':''}
        <div class="menu-type-label">${m.label}</div>
        <div class="menu-main">${m.main}</div>
        <div class="menu-sides">${(m.sides||'').replace(/\n/g,'<br>')}</div>
        ${badges?`<div class="menu-badges">${badges}</div>`:''}
        ${sel?'<div class="menu-check">✓</div>':''}
      </div>`;
    });
  }
  area.innerHTML=`<div class="menu-card">
    <div class="menu-card-title"><span>${DAY_NAMES[dow]}, ${fmtFull(date)}</span><span class="kw-badge">KW ${kw}</span></div>
    <div class="menu-grid">${grid}</div>
  </div>`;
}

function renderClosedBanner(){
  const vd=visibleDays();
  const banner=document.getElementById('closedBanner');
  if(!vd.length){banner.innerHTML='';return;}
  const date=vd[currentDayIdx];
  if(isClosed(date)){
    banner.innerHTML=`<div class="closed-notice">🔒 <span><strong>Anmeldeschluss erreicht.</strong> Eine Anmeldung für heute ist nach 10:00 Uhr nicht mehr möglich.</span></div>`;
  } else if(date===todayStr()){
    banner.innerHTML=`<div class="deadline-notice">⚠️ Anmeldung bis heute <strong>10:00 Uhr</strong> – danach geschlossen.</div>`;
  } else {
    banner.innerHTML='';
  }
}

function selMenu(id){selectedMenuId=id;renderMenuArea();updateSel();}
function updateSel(){const s=document.getElementById('menuSelect');if(s&&selectedMenuId)s.value=selectedMenuId;}

function renderFormArea(){
  const vd=visibleDays();
  if(!vd.length){document.getElementById('formArea').innerHTML='';return;}
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const menus=loadMenus();
  const dm=menus[date]||[];
  const closed=isClosed(date);

  let opts='<option value="">– Menü wählen –</option>';
  dm.forEach(m=>{opts+=`<option value="${m.id}"${selectedMenuId===m.id?' selected':''}>${m.main}</option>`;});

  const pt=selectedPay==='twint'?' selected':'';
  const pb=selectedPay==='bar'?' selected':'';
  const dis=closed?'disabled':'';

  document.getElementById('formArea').innerHTML=`
    <div class="section-divider">Anmeldung</div>
    <div class="form-card">
      <div class="form-title">Für ${DAY_NAMES[dow]}, ${fmtShort(date)} anmelden</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ihr Name</label>
          <input class="form-input" type="text" id="nameInput" placeholder="Vor- und Nachname" autocomplete="name" ${dis}>
        </div>
        <div class="form-group">
          <label class="form-label">Menüwahl</label>
          <select class="form-input" id="menuSelect" onchange="onSelChange()" ${dis}>${opts}</select>
        </div>
      </div>
      <label class="form-label" style="margin-bottom:8px;display:block;">Bezahlart</label>
      <div class="payment-toggle">
        <button class="pay-btn${pt}" onclick="selPay('twint')" ${dis}><div class="pay-icon">📱</div>Twint</button>
        <button class="pay-btn${pb}" onclick="selPay('bar')" ${dis}><div class="pay-icon">💵</div>Bar</button>
      </div>
      <button class="submit-btn" onclick="submit()" ${dis}>${closed?'🔒 Anmeldeschluss erreicht':'✓ Anmelden'}</button>
    </div>`;
}

function onSelChange(){const s=document.getElementById('menuSelect');selectedMenuId=s.value||null;renderMenuArea();}
function selPay(t){
  if(isClosed(visibleDays()[currentDayIdx]))return;
  selectedPay=t;
  const n=document.getElementById('nameInput');const v=n?n.value:'';
  renderFormArea();
  const n2=document.getElementById('nameInput');if(n2)n2.value=v;
}

function submit(){
  const vd=visibleDays();
  const date=vd[currentDayIdx];
  if(isClosed(date)){showToast('🔒 Anmeldeschluss – nicht mehr möglich');return;}
  const nameEl=document.getElementById('nameInput');
  const name=nameEl?nameEl.value.trim():'';
  const ms=document.getElementById('menuSelect');
  if(ms&&ms.value)selectedMenuId=ms.value;
  if(!name){showToast('❌ Bitte Namen eingeben');return;}
  if(!selectedMenuId){showToast('❌ Bitte ein Menü auswählen');return;}
  if(!selectedPay){showToast('❌ Bitte Bezahlart wählen');return;}
  const menus=loadMenus();
  const dm=menus[date]||[];
  const menu=dm.find(m=>m.id===selectedMenuId);
  const menuLabel=menu?menu.main:selectedMenuId;
  const regs=loadRegs();
  if(!regs[date])regs[date]=[];
  const ei=regs[date].findIndex(r=>r.name.toLowerCase()===name.toLowerCase());
  if(ei>=0){regs[date][ei]={name,menuId:selectedMenuId,menuLabel,pay:selectedPay};showToast('✏️ Anmeldung aktualisiert');}
  else{regs[date].push({name,menuId:selectedMenuId,menuLabel,pay:selectedPay});showToast('✅ Erfolgreich angemeldet!');}
  saveRegs(regs);
  selectedMenuId=null;selectedPay=null;
  renderMenuArea();renderFormArea();renderList();
}

function renderList(){
  const vd=visibleDays();
  if(!vd.length){document.getElementById('registrationList').innerHTML='<div class="list-empty"><div class="list-empty-icon">📋</div>Keine Tage verfügbar</div>';document.getElementById('listCount').textContent='0';return;}
  const date=vd[currentDayIdx];
  const offset=viewWeek==='next'?1:0;
  const all=weekDates(offset);
  const dow=all.indexOf(date);
  const regs=loadRegs();
  const dr=(regs[date]||[]).slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
  document.getElementById('listTitle').textContent=`Anmeldungen ${DAY_NAMES[dow]}`;
  document.getElementById('listCount').textContent=dr.length;
  const list=document.getElementById('registrationList');
  if(!dr.length){list.innerHTML='<div class="list-empty"><div class="list-empty-icon">📋</div>Noch keine Anmeldungen</div>';return;}
  list.innerHTML=dr.map(r=>{
    const ini=r.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    return `<div class="registration-item" onclick="openModal('${date}')" title="Klicken zum Abmelden">
      <div class="reg-avatar">${ini}</div>
      <div class="reg-info">
        <div class="reg-name">${r.name}</div>
        <div class="reg-details">${r.menuLabel}</div>
        <div class="hint">Zum Abmelden klicken</div>
      </div>
      <span class="reg-pay ${r.pay}">${r.pay==='twint'?'📱 Twint':'💵 Bar'}</span>
    </div>`;
  }).join('');
}

function openModal(date){
  unregisterDate=date;
  document.getElementById('modalNameInput').value='';
  document.getElementById('modalError').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('modalNameInput').focus(),120);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');unregisterDate=null;}
function confirmUnregister(){
  if(!unregisterDate)return;
  const typed=document.getElementById('modalNameInput').value.trim();
  if(!typed){document.getElementById('modalError').textContent='❌ Bitte Namen eingeben.';document.getElementById('modalError').style.display='block';return;}
  const regs=loadRegs();
  const dr=regs[unregisterDate]||[];
  const match=dr.find(r=>r.name.toLowerCase()===typed.toLowerCase());
  if(!match){document.getElementById('modalError').textContent='❌ Name nicht gefunden. Bitte genau so eingeben wie bei der Anmeldung.';document.getElementById('modalError').style.display='block';return;}
  regs[unregisterDate]=dr.filter(r=>r.name.toLowerCase()!==typed.toLowerCase());
  if(!regs[unregisterDate].length)delete regs[unregisterDate];
  saveRegs(regs);
  closeModal();renderList();showToast('🗑️ Abmeldung erfolgreich');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.getElementById('modalNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmUnregister();});

init();
</script>
</body>
</html>
